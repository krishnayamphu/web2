<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navigation</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 0;
      }

      nav {
        background-color: orangered;
        width: 80%;
        margin: 0 auto;
      }
      nav ul {
        list-style-type: none;
      }
      nav ul li {
        display: inline-block;
      }
      nav ul li a {
        text-decoration: none;
        display: block;
        margin: 0 30px;
        padding: 10px 0;
        color: #0d0d0d;
        position: relative;
        transition: all 0.5s;
      }
      nav ul li a::after {
        content: "";
        width: 0;
        transition: all 0.5s;
      }
      nav ul li a:hover::after {
        content: "";
        width: 100%;
        height: 2px;
        background-color: #0d0d0d;
        position: absolute;
        left: 0;
        bottom: 0;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Blog</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </body>
</html>
