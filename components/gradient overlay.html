<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      div {
        width: 600px;
        height: 200px;
        border: 2px solid orangered;
        margin: 15px auto;
        background-size: cover;
        text-align: center;
        line-height: 200px;
        font-size: 50px;
        color: white;
      }
      .box1 {
        background-image: linear-gradient(
            rgba(255, 0, 0, 0.8),
            rgba(0, 0, 255, 0.8)
          ),
          url(bg.jpg);
      }
      .box2 {
        background-image: linear-gradient(
            rgba(0, 0, 0, 0.8),
            rgba(0, 0, 0, 0.8)
          ),
          url(bg.jpg);
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2">Hello World</div>
  </body>
</html>
