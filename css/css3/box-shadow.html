<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        border: 1px solid red;
        margin: 15px;
        float: left;
      }
      .box1 {
        box-shadow: 2px 2px 2px black;
      }

      .box2 {
        box-shadow: -2px -2px 6px 2px black;
      }

      .box3 {
        box-shadow: 0 0 2px 2px rgb(57, 27, 255);
      }
      .box4 {
        box-shadow: inset 0px 0px 15px rgb(57, 27, 255);
      }
      .box5 {
        box-shadow: 2px 2px 1px blue, -2px -2px 1px green;
      }
      .box6 {
        border: none;
        border-radius: 5px;
        box-shadow: 0 0 5px rgb(67, 67, 67);
        transition: all 0.5s;
      }
      .box6:hover {
        box-shadow: 0 0 5px 2px rgb(0, 0, 0);
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
  </body>
</html>
