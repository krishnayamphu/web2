<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      div {
        width: 100px;
        height: 100px;
        border: 2px solid orangered;
        margin: 15px;
        float: left;
      }
      .box1 {
        background-image: conic-gradient(red, blue);
      }
      .box2 {
        background-image: conic-gradient(from 90deg, red, blue);
      }
      .box3 {
        background-image: conic-gradient(at 70% 50%, red, blue);
      }
      .box4 {
        background-image: conic-gradient(from 45deg at 60% 40%, red, blue);
      }
      .box5 {
        background-image: conic-gradient(red, blue, yellow, green, red);
      }
      .box6 {
        background-image: conic-gradient(
          rgba(255, 0, 0, 0.2),
          rgba(0, 0, 255, 1)
        );
      }
      .box7 {
        background-image: conic-gradient(
          red 33%,
          blue 33%,
          blue 66%,
          green 66%
        );
      }

      .box8 {
        background-image: conic-gradient(
          red 90deg,
          blue 90deg,
          blue 180deg,
          green 180deg,
          green 270deg,
          orange 270deg
        );
        border-radius: 50%;
      }
      .box9 {
        background-image: repeating-conic-gradient(red, yellow 3%);
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
    <div class="box7"></div>
    <div class="box8"></div>
    <div class="box9"></div>
  </body>
</html>
