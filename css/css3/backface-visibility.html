<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      div {
        width: 100px;
        height: 100px;
        background-color: teal;
        float: left;
        margin: 30px;
        transition: all 1s;
        text-align: center;
        line-height: 100px;
      }

      .container {
        width: 80%;
        margin: 30px auto;
        float: none;
        border: 1px solid red;
        height: 200px;
        background-color: white;
        perspective: 500px;
      }

      .box1:hover {
        transform: rotateY(180deg);
        backface-visibility: visible;
      }
      .box2:hover {
        transform: rotateY(180deg);
        backface-visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box1">box1</div>
      <div class="box2">box2</div>
    </div>
  </body>
</html>
