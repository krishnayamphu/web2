<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html</title>
    <style>
      :root {
        --primary-color: rgb(8, 97, 73);
        --radius-sm: 2px;
        --radius: 5px;
        --radius-lg: 10px;
      }

      h1 {
        color: var(--primary-color);
      }

      p {
        padding: 15px;
        border-radius: var(--radius);
        margin: 0;
        color: white;
        background-color: var(--primary-color);
      }
    </style>
  </head>
  <body>
    <h1>Hello World</h1>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Blanditiis dolore
      porro vitae rerum, rem nam dicta hic doloremque deleniti nesciunt?
      Veritatis dolor nesciunt soluta culpa magni laborum beatae deserunt
      delectus!
    </p>
  </body>
</html>
