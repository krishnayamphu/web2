<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      div {
        width: 100px;
        height: 100px;
        background-color: rgba(0, 128, 128, 0.63);
        float: left;
        margin: 30px;
        transition: all 1s;
        text-align: center;
        line-height: 100px;
      }

      .container {
        width: 80%;
        margin: 30px auto;
        float: none;
        border: 1px solid red;
        height: 200px;
        background-color: transparent;
        perspective: 500px;
        transform-style: preserve-3d;
      }

      .box1 {
        transform: rotateY(0deg);
        background-color: rgba(0, 128, 0, 0.693);
        position: absolute;
      }
      .box2 {
        transform: rotateY(80deg) translate(5px, 50px);
        position: absolute;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box1">box1</div>
      <div class="box2">box2</div>
    </div>
  </body>
</html>
