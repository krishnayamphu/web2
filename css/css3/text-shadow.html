<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html</title>
    <style>
      h1 {
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        margin-bottom: 15px;
      }
      .shadow1 {
        text-shadow: 2px 2px 2px rgb(255, 0, 0);
      }

      .shadow2 {
        text-shadow: -2px -2px 1px rgb(4, 202, 7);
      }
      .shadow3 {
        color: white;

        text-shadow: 2px 2px 0px rgb(255, 0, 0), -2px -2px 0px rgb(4, 202, 7);
      }
      .shadow4 {
        transition: all 0.5s;
      }
      .shadow4:hover {
        text-shadow: -2px -2px 1px rgb(4, 202, 7);
      }
    </style>
  </head>
  <body>
    <h1 class="shadow1">Hello World</h1>
    <h1 class="shadow2">Hello World</h1>
    <h1 class="shadow3">Hello World</h1>
    <h1 class="shadow4">Hello World</h1>
  </body>
</html>
