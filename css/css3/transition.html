<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html</title>
    <style>
      h1 {
        text-align: center;
        transition-property: all;
        transition-duration: 1000ms;
        transition-timing-function: ease;
        transition-delay: 0s;
      }
      h1:hover {
        background-color: orangered;
        color: blue;
      }

      p {
        font-family: Arial, Helvetica, sans-serif;
        transition: all 1s;
      }
      p:hover {
        padding: 15px;
        background-color: pink;
      }

      img {
        width: 100px;
        transition: all 1s;
      }
      img:hover {
        opacity: 0.5;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Hello World</h1>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Dignissimos
      tempora laudantium voluptatibus mollitia, impedit optio, corporis quae aut
      nulla itaque id modi dolore facilis! Dolore veritatis dignissimos
      laudantium doloremque vero!
    </p>

    <img src="../bg.jpg" alt="" />
  </body>
</html>
