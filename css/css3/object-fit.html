<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html</title>
    <style>
      img {
        width: 200px;
        height: 300px;
        border: 10px solid green;
      }
      .cover {
        object-fit: cover;
      }
      .contain {
        object-fit: contain;
      }
      .top {
        object-position: top;
      }
    </style>
  </head>
  <body>
    <img src="bg.PNG" alt="" />
    <img src="dish.jpg" alt="" />
    <img class="cover" src="bg.PNG" alt="" />
    <img class="contain" src="dish.jpg" />
    <img class="contain top" src="dish.jpg" />
  </body>
</html>
