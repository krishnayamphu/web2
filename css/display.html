<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html</title>
    <style>
      div {
        width: 200px;
        height: 100px;
        background-color: green;
        display: inline;
      }
      span {
        width: 200px;
        height: 100px;
        background-color: pink;
        display: block;
      }
      a {
        background-color: brown;
        width: 100px;
        height: 50px;
        display: inline-block;
      }
      p {
        background-color: aquamarine;
        padding: 15px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div>div</div>
    <span>inline</span>

    <a href="#">Link 1</a>
    <a href="#">Link 2</a>

    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Laborum
      distinctio corrupti doloremque aut ipsam assumenda impedit, soluta
      voluptatibus sequi laboriosam. Porro earum quos sunt qui libero atque
      dicta facilis tempora.
    </p>
  </body>
</html>
