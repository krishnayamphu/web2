<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox</title>
    <style>
      .row {
        border: 1px solid red;
        display: flex;
        margin-bottom: 15px;
        width: 400px;
      }
      .col {
        background-color: rgb(244, 142, 59);
        width: 200px;
      }
      .col:nth-child(even) {
        background-color: rgb(11, 111, 43);
      }
      .col:last-child {
        background-color: violet;
      }

      .shrink-1 {
        flex-shrink: 1;
      }
      .shrink-2 {
        flex-shrink: 2;
      }
      .shrink-3 {
        flex-shrink: 3;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="col">1</div>
      <div class="col">2</div>
      <div class="col">3</div>
    </div>
    <div class="row">
      <div class="col">1</div>
      <div class="col">2</div>
      <div class="col shrink-2">3</div>
    </div>

    <div class="row">
      <div class="col shrink-1">1</div>
      <div class="col shrink-2">2</div>
      <div class="col shrink-1">3</div>
    </div>

    <div class="row">
      <div class="col shrink-1">1</div>
      <div class="col shrink-3">2</div>
      <div class="col shrink-1">3</div>
    </div>

    <div class="row">
      <div class="col shrink-1">1</div>
      <div class="col shrink-2">2</div>
      <div class="col shrink-3">3</div>
    </div>

    <div class="row space-around">
      <div class="col shrink-1">1</div>
      <div class="col shrink-3">2</div>
      <div class="col shrink-3">3</div>
    </div>

    <div class="row space-evenly">
      <div class="col shrink-1" style="width: 400px">1</div>
      <div class="col shrink-3">2</div>
    </div>
  </body>
</html>
