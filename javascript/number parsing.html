<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <script>
      document.write(parseInt("10") + "<br>");
      document.write(parseInt("10.5") + "<br>");
      document.write(parseInt("10 a") + "<br>");
      document.write(parseInt("a 10") + "<br>");

      document.write("<hr>");

      document.write(parseFloat("10") + "<br>");
      document.write(parseFloat("10.5") + "<br>");
      document.write(parseFloat("10.5 a") + "<br>");
      document.write(parseFloat("a 10") + "<br>");

      document.write("<hr>");
      document.write(eval("10+5-2") + "<br>");
      document.write(eval("a+10") + "<br>");
    </script>
  </body>
</html>
