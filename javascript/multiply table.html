<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <script>
      let n = 2;
      for (let i = 1; i <= 10; i++) {
        document.write("<p>" + n + " x " + i + " = " + n * i + "</p>");
      }
    </script>
  </body>
</html>
