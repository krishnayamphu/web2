<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 0;
      }
      .login-form {
        width: 300px;
        margin: 60px auto;
        background-color: pink;
        padding: 1rem;
      }
      .login-form input {
        width: 290px;
        margin-bottom: 15px;
        padding: 5px;
      }
      .login-form #error {
        color: red;
        margin-bottom: 5px;
      }
      .login-form button {
        width: 100%;
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <div class="login-form">
      <p id="error">+</p>
      <form name="frm" onsubmit="return valid()">
        <input
          type="text"
          name="username"
          id="username"
          placeholder="Username"
        />
        <input
          type="password"
          name="password"
          id="password"
          placeholder="Password"
        />
        <button>Login</button>
      </form>
    </div>

    <script>
      function valid() {
        let username = document.forms["frm"].username.value;
        let password = document.forms["frm"].password.value;
        if (username == "") {
          document.getElementById("error").innerHTML =
            "Username field is required";
          document.getElementById("username").focus();
          return false;
        } else if (password == "") {
          document.getElementById("error").innerHTML =
            "Password field is required";
          document.getElementById("password").focus();
          return false;
        } else if (username == "admin" && password == "a123") {
          alert("Login success");
          return true;
        } else {
          document.getElementById("error").innerHTML =
            "Invalid username or password";
          document.getElementById("username").select();
          return false;
        }
      }
    </script>
  </body>
</html>
