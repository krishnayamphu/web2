<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <input type="text" id="mytext" oninput="countLength()" />
    <button onclick="upper()">Uppercase</button>
    <button onclick="lower()">Lowercase</button>

    <p>Length: <span id="count">0</span></p>
    <script>
      function upper() {
        let data = document.getElementById("mytext").value;
        document.getElementById("mytext").value = data.toUpperCase();
      }
      function lower() {
        let data = document.getElementById("mytext").value;
        document.getElementById("mytext").value = data.toLowerCase();
      }

      function countLength() {
        let data = document.getElementById("mytext").value;
        document.getElementById("count").innerHTML = data.length;
      }
    </script>
  </body>
</html>
