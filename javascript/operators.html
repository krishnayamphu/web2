<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <script>
      let a = 5;
      a--;
      let b = 4;
      document.write(a);
      document.write("<br>output:" + (21 % 5));

      let x = 10;
      let y = 15;
      x += 5;
      y -= 10;

      document.write("<br>" + x);
      document.write("<br>" + y);

      document.write(a > b);

      document.write(a > b && a > y);
    </script>
  </body>
</html>
